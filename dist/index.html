    <!-- ─── Schema: FAQPage ────────────────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Was kostet KI-Automatisierung für mein Unternehmen?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Die Kosten für KI-Automatisierung hängen vom Projektumfang, der Komplexität der Prozesse und dem gewünschten Integrationsgrad ab. Einfache Automatisierungen – zum Beispiel die Verbindung zweier Tools via API oder ein einfacher KI-Chatbot – starten typischerweise ab 2.000 EUR einmalig. Komplexere Systeme mit mehreren Integrationen, Custom-KI-Agenten oder umfangreicher Prozessautomatisierung liegen entsprechend höher. Was wir sagen können: Eine gut umgesetzte Automatisierung rechnet sich in der Regel innerhalb weniger Wochen durch eingesparte Arbeitszeit. Nach einem kostenlosen 30-minütigen Erstgespräch erhalten Sie innerhalb von 48 Stunden ein transparentes, individuelles Angebot – ohne versteckte Kosten."
          }
        },
        {
          "@type": "Question",
          "name": "Wie lange dauert die Umsetzung einer KI-Automatisierung?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Die Umsetzungszeit hängt vom Projektumfang ab. Einfache Automatisierungen – beispielsweise das automatische Weiterleiten von Leads aus einem Formular ins CRM oder ein grundlegender KI-Chatbot – sind oft in wenigen Tagen einsatzbereit. Mittlere Projekte mit mehreren Systemverbindungen und individuellem Workflow sind typischerweise innerhalb von 1–2 Wochen live. Komplexere Systeme mit Custom-KI, mehreren API-Integrationen oder umfangreicher Logik dauern 3–6 Wochen. Wir arbeiten agil: Erste funktionierende Ergebnisse liefern wir früh, damit Sie schnell von der Automatisierung profitieren. Die genaue Timeline besprechen wir im kostenlosen Erstgespräch und halten sie im Angebot transparent fest."
          }
        },
        {
          "@type": "Question",
          "name": "Brauche ich technisches Wissen für KI-Automatisierung?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nein, technisches Vorwissen ist nicht erforderlich. Sie beschreiben uns Ihren Prozess in normaler Sprache – zum Beispiel: 'Jede neue Anfrage aus unserem Kontaktformular soll automatisch ins CRM eingetragen und einem Vertriebsmitarbeiter zugewiesen werden.' Den Rest übernehmen wir komplett. Wir analysieren den Prozess, wählen die passenden Tools (z. B. n8n, Make, OpenAI), entwickeln die Automatisierung, testen sie gründlich und übergeben sie Ihnen mit einer verständlichen Dokumentation und persönlicher Einweisung. Falls Sie Fragen haben oder Anpassungen benötigen, sind wir nach der Übergabe weiterhin ansprechbar."
          }
        },
        {
          "@type": "Question",
          "name": "Ist die KI-Lösung DSGVO-konform?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja, DSGVO-Konformität hat bei uns höchste Priorität. Als deutsches Unternehmen entwickeln wir alle Lösungen von Anfang an unter Berücksichtigung der Datenschutz-Grundverordnung. Konkret bedeutet das: Datenspeicherung auf EU-Servern, minimale Datenhaltung nach dem Need-to-know-Prinzip, vollständige Dokumentation aller Datenverarbeitungsprozesse und Auftragsverarbeitungsverträge (AVV) wo nötig. Wir beraten Sie auch zu datenschutzrechtlichen Fragen rund um den Einsatz von KI in Ihrem Unternehmen – zum Beispiel beim Einsatz von Chatbots oder bei der automatisierten Verarbeitung von Kundendaten."
          }
        },
        {
          "@type": "Question",
          "name": "Für welche Branchen eignet sich KI-Automatisierung?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "KI-Automatisierung eignet sich grundsätzlich für alle Branchen, in denen Aufgaben wiederholt werden, Systeme nicht miteinander verbunden sind oder Kommunikation manuell läuft. Wir haben Projekte für Handwerksbetriebe (automatische Rechnungsstellung, Terminverwaltung), Arztpraxen (KI-Telefonassistent, Terminbuchung), E-Commerce-Händler (vollautomatische Bestellabwicklung), Immobilienmakler (Dokumentenverarbeitung), Unternehmensberater (Lead-Scoring) und andere Dienstleister umgesetzt. Besonders großes Potenzial sehen wir bei KMU im DACH-Raum, die noch keine Automatisierung einsetzen und durch einfache erste Schritte sofort messbare Zeitersparnis erzielen können."
          }
        },
        {
          "@type": "Question",
          "name": "Was passiert nach der Umsetzung?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nach der Übergabe lassen wir Sie nicht allein. Wir begleiten den Go-Live aktiv, sind in den ersten Wochen für Fragen und schnelle Anpassungen erreichbar und beheben eventuelle Startschwierigkeiten ohne Mehrkosten. Auf Wunsch bieten wir ein laufendes Betreuungspaket an, das regelmäßige Wartung, Monitoring und Weiterentwicklung der Automatisierungen umfasst. Viele unserer Kunden arbeiten langfristig mit uns zusammen – weil sich nach der ersten Automatisierung oft weitere Hebel zeigen, die zusätzlichen Mehrwert schaffen."
          }
        },
        {
          "@type": "Question",
          "name": "Was ist n8n und warum nutzt ihr es?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "n8n ist ein Open-Source-Automatisierungstool, das ähnlich wie Make oder Zapier funktioniert, aber deutliche Vorteile für Unternehmenseinsatz bietet: Es kann selbst gehostet werden (keine Abhängigkeit von externen SaaS-Anbietern), ist DSGVO-freundlicher, günstiger bei hohem Volumen und deutlich flexibler bei komplexen Automatisierungen. Für deutsche KMU, die Wert auf Datensouveränität legen, ist n8n daher oft die bessere Wahl gegenüber US-amerikanischen Alternativen. Wir setzen n8n für Workflow-Automatisierungen, API-Integrationen und als Grundlage für KI-Agenten ein – je nach Anforderung kombiniert mit Make, Zapier, Python oder direkten API-Integrationen."
          }
        }
      ]
    }
